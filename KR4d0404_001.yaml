body:
  text: 百正集卷上宋連文鳳撰五言古詩秋懷草木一何情榮悴皆有時颯颯涼風至一夕失華滋壯士撫蕭晨慷慨令心悲流光日以邁西風生别離渺渺愁豫懷此懷誰能知天髙正寥泬深夜羣動閴秋聲從何來淅瀝復蕭瑟須臾忽澎湃愁思若悽惻罷琴試靜聽紛紛鳴四壁有如賈少年流涕重太息時事巳凄涼俯仰一今昔嗟余復何言抱此長戚戚西北多隂風日夜吹裳衣草蟲動機杼札札鳴聲悲百憂彌中腸歡樂復何時今日忽巳逝來日未可知且飲以狂藥酩酊從所之漫漫秋夜長夜長不能寐抱琴出中庭月影落在地一彈復再彈聲淡趣亦至誰家筝笛聲紛紛亂人思音響何急促忽忽無古意嗟哉鍾儀心千古獨憔悴茫茫秋水波灼灼芙蓉姿采之不盈掬及此行樂時陽鳥來南翔玄鳥將西歸羇旅獨牽營泯默生窮思美人不可見長歌以自怡季鷹真達士棄宦歸東吳祿無盈寸榮盎無升斗儲盤桓吳溪上所樂只在魚懷組夸鄉里佩印驕妻孥朝從髙鳥翔莫隨舜華枯富貴豈不好不能少須臾朔風吹塵沙出門皆畏途抱影廓獨倚新榮非良圗隂隂陵上柏離離陵上草樵兒與牧竪躑躅陵上道蛻骨出榛莽后土不愛寶衰蟬弔寂寞寒蟾照枯稿白雲散同漫西風不敢掃蓋棺千年後既往不能保人生血肉軀百年終醜老安得紫微書遺我一火棗娟姢誰家女軋軋弄機杼買絲織未成催租立當户下機愁向人憔悴不敢語泣涕走深山深山更風雨秋雨歎秋雨何紛紛百草凍欲爛曈曨不見日黤曖猶未旦煙雲雜澒洞霄壤雨漫漶阡陌何由分涇渭不復判怒觸老木摧響急猛獸散平陸魚鱉飛行客鳥鼠竄田禾藜莠興斗米衾裯換書生破茅屋展轉長夜半此時蒼生憂誰知幾百萬送張仲實遊姑蘇君本吳下居復作吳下遊愛此山水佳役役不得休卓哉太史公涉獵縱𡨕搜往躅誰能追而有蘇子由寥寥百載後渺渺皆豫愁江南地益卑士習日益偷此行數百里不過三兩州歐韓不復作去去將奚求倘君有所得歸以發我幽智果寺拜東坡參寮遺像次韻吾愛參寮子遺偈寄真迹像貌儼如生鈎畫宛若昔讀此一代文令人百慮釋又愛東坡老仙才逈飄逸吟哦月露章飛奮風雨筆古寺遺清風殘碑卧白日我來拜祠下怡然若私覿和之詩與禪詩禪機籟寂相對兩忘言終朝不獲一徘徊走風廊舂容坐苔石於心適有契所得不患失禪空詩亦空觀空莫觀色寥寥百載下無此二騷客買酒為招魂欲招不可得送人入北求仕南方有竒士湖海聲獵獵功名志氣鋭不憚逺跋涉春風一片紙區區無所挾持此欲取償易於拾秋葉何以贈君言勉哉耘其業慈烏步出東南林啞啞聞哀音哀音不堪聞而有反哺心子母誰無情爾情抑何深昔人稱爾孝鳥中之曽參人於物最靈奈何不如禽稻花紛紛兒女花為人作顔色眼飽聊自慰飢來不堪食此花不入譜豈是凡花匹太陽麗天中正氣從午得開此豐穰瑞脫彼風雨厄始華郁而甘未粲光巳白我行田野間舒嘯意自適田者告我言樂嵗茲可必但期一飽死百年漫勞役鳲鳩時兮呼婦來時兮驅婦去呼來知天晴驅去知天雨一去或一來非為新與故白雲變蒼狗人事何錯忤不念糟粳時棄如路傍土吠犬爪牙淬霜戟眼睛耀銅鈴輕狷更健捷羣獸此最靈吠堯非無知怪不類桀形一片愛主心庸作警世銘哀哉乞憐者搖尾偷餘齡蜜蜂羣居崖谷間不食人間食春風百花場來往無虛日採花釀為糧倉廩自充實歘罹割裂殃操戈窮入室何異誤國人腹劍而口蜜七言古詩寄廬陵劉國博會孟先輩吁嗟天地何夢中魈魌日夜噓寒風萬物元氣銷鑠盡文章千古無時窮先生驅文挾風雨筆勢不停心自語頖池水暖芹正香物換星移時不魯昔魯東門巳無人況今門外車馬塵飛塵著天黑如漆靈光一點爭嶙峋新進少年競浮靡粧點春妍學桃李貞元朝士巳無多不識伯淳堪愧死江空嵗晚雪滿天錢塘風景經幾年片言隻字落人世至今識者猶能傳愧乏新詩送盤谷恨别情多歌不足語言憔悴更可憐故都寫作斷腸曲澘然老泪愁天津銅駝巷陌荆棘深吳雲江樹黯無色千里共此凄涼心昌黎博士頭巳白籍湜當年門下客俱是乾坤無用人一見新詩重相憶噫嘻齋前煙雨凄橫江老鶴今來歸我欲附之翎翅短此情寄與東風飛董源山水圗為北客賦江南本是山水國峽影峨雲插空碧世人愛畫不愛真一幅生綃懸素壁董生好手畢宏上意在筆先方落筆雲關岫幌掃層青月浦煙汀寫修白縱橫瑣細分毫釐變化幽冥絶痕迹滄江碣石忽破碎片紙散漫留不得當年載入米家船夜夜虹光八千尺新評信口誇天真聲價秪今萬錢直流傳知落幾人手神物護持入君室世間尢物能移人莫看江南望江北重遊天竺何年飛去竺國峰下際滄海蟠蛟龍崛竒詭怪獻萬狀八風播蕩吹不融千年老藤無根樹長疑上有仙人住山空月白玄猿啼咫尺蓬萊隔塵霧瑤草春深不復妍荆棘花開顔色鮮誰驅蠻風煽劫火神驚鬼哭愁山川又疑黑衣故宰相香火未冷今生緣欲挾須彌還北海未必神通能廣大康回馮怒相傾摧神氣未完支節解穿崖鑿谷何時寧混沌死矣靈不靈題濕洞棲霞嶺頭起煙霧棲霞洞前撼風雨洞門深鎖碧泉寒控塞玉壺氷雪貯未容俗客潄齒牙且乞詩人滌肝腑何當買屋此山居山中六月不知暑招隱吟碧澗清泉白石寒神仙一往不可攀蓬瀛縹眇非人寰天風髙兮翔青鸞欲往從之春花秋葉殘歸去來兮畏途而惡灘歸去來兮緑水與青山衣蓑笠箬煙幌雲關揖許由拉巢父相與徜徉兮廣莫之間黃塵不飛兮白日間芝苓森森兮風露漫漫贈畫者并序一日有一生擕詩過余長揖而前曰某姓某名某某所人也世不治他技以畫為生君貌癯而神清形枯而色不衰殆類夫隱者也請圗之雖然願得君一語自壯足矣余笑曰噫余天地間無用人也身贅矣子將以畫贅之奚為哉且而畫工安所事吾詩不工雖得吾詩奚益生之請益堅于是進而語之曰余非能詩者子欲名子之畫當求之世之賢士大夫庶幾貴子之藝而成子之名生唯唯余故序其所以詩之意云麒麟閣上十一人斯人瑞世真麒麟雲臺功臣二十八中興事業爭嶙峋或在生前或死後藉藉聲名自不朽不知當時畫者誰似此畫者當好手古今何代無人材翕霍變化俱塵埃豈是畫師好手不復遇豈是世無麟閣與雲臺虎頭燕頷今巳矣婢膝奴顔當愧死江湖人物何渺然子當為我走訪山林隱君子伍相公廟丁亥被燬蘆中人蘆中人漁父相逢潯水津一言慷慨辭寶劍江空月白波粼粼被髮佯狂乞吳市狀貌不類流離民博浪鐡椎袖入手留侯切切志在秦踰淮涉泗掃荆闕死龍鞭笞無完鱗日暮途窮快逆施憤怒激烈忘君臣堂堂廟食幾千祀一夕化作風中塵吳山落照秋風老草木黤慘無餘春天道茫茫忽今古世事渺渺如雲輪蘆中人蘆中人生為公相死為神何時拔刀斫鱠痛飲松江醇五言律庚子立春又逢庚子嵗老景對韶華簷噪朝朝鵲燈開夜夜花凄迷連月雨冷落幾人家幸有新春酒瓶中不用賖東坡竹眉山墓木拱墨迹此淋漓風葉活欲動霜根死不移老仙初畫處元祐太平時直節有如此何緣入黨碑寄林處士景初詩書嵗月久到老未忘情一自文風變長憂雅道輕時人空見忌聖主舊知名更有孤髙節氷霜無此清二月晦日懷林處士相思忽成夢久不到茶窩飛去羽毛短别來風雨多杏花一夜發春事二分過百尺龍潭上知君意若何種菖蒲此種即昌陽稜稜九節長薜蘿不敢碧忩户自生香病眼看能醒間心覺漸涼余非學仙者莫問引年方夏日池亭小憩眼前無俗物萬竹與千荷來此坐清晝看風生白波間心諸事省靜耳一蟬多詩酒足消遣其如長日何葛嶺廢第此是歌鐘第斯人去不還繁華一夢裏風雨十年間紅葉自成徑緑苔空掩關國亡家亦破愁殺夕陽山題在家僧自在窩此即家山處春風住幾年晝看紅日坐時抱白雲眠半榻清間地一龕安樂禪叢林有規矩何似且隨緣曉起鐘聲廢早眠倚棹過晴川半夜涼風起一帆秋影懸僧聫聞鴈句僕請買魚錢每被人相問誰家書畫船簡李元暉移棹方遊霅擕琴又到杭溪山隨影轉日月共貧忙何處依劉表無人識子長世情巳如此客路獨堪傷夀林處士人物推先輩江湖姓字香今年方八十此老不尋常道義襟期重詩書氣味長顧余蒲栁質那得似彭郎中秋玩月此夜月如晝有人同倚樓山河萬古色天地一輪秋盡賞興不足醉看身欲浮因思舊年處風雨未能休暮秋雜興門巷多車馬空齋掩半扉天時秋後變人事日來非嵗月銷英氣風霜敝客衣誰知光景短冉冉去如飛自憐今老大空憶舊歡娛翻覆看時事艱危涉世途客身湘浦鴈歸夢越鄉鱸安得神仙術行藏寄一壺栖栖猶未定去去復何求縱有劉伶酒難消杜甫愁黑雲天易晚紅葉樹多秋哀怨不堪聽笛聲何處樓西風離别泪點點落清笳曲變猶莊舄琴亡自瓠巴餘生空嵗月倦迹久塵沙顧影知何似蒼蒼白露葭且説西湖事未言東海枯悲風荒野大落照廢城孤有句填詩債無錢覔酒壚不堪重舉目景物入秋殊似隱還非隱未能忘世情山河亡國恨風雨客樓聲窮有天堪問貧無地可耕桃源窅何處目斷故秦城老計笑空疏清風一草廬間門心迹在仕籍姓名除曲唱貞元後吟歸丙子初不言封禪事誰識病相如釣絲風短髮冷颼颼倚船初下鈎間來片水外輕弄一痕秋淺拂蘋花落低隨栁影浮煙波清夢逺吹不到王侯晚步不知風露寒深坐翠微間對酒秋花盡看雲暝鶴還鐘聲黃葉寺樵唱夕陽山安得吟身健長隨白日間菊不用移春檻西風滿客車行行無長物粲粲只黃花晚色裝秋重寒香引霧斜輦來尊俎處有酒不須賖題友人湘行藁詩史久不作此遊清興長看山到湘水隨鴈過衡陽醉裏關河在吟餘草木香九歌流落處想為一沾裳悼鶴為楊彥禮賦忽隨塵土化不復此翩蹮遺迹今猶在主人時自憐晚風琴操外殘月石牀邉幾夜夢中見夢中疑是仙廢冡零落誰家冡烏鳶出土飛黃金知有屬白骨竟無歸野鳥啼隂樹行人弔夕暉蓋棺猶未定何況此生微中秋偶病中秋不見月扶病倚闌干故國愁心逺西風瘦骨寒縱無今夕醉容有别時看且作南飛鵲一枝聊自安病後一病忽半載囊無挑藥資生逢千劫後死較十年遲老色從侵面間愁併上眉惟餘清思在瘦盡尚能詩八月病中此病從何得蹉跎過六年家貧無長物藥債似隨肩衰颯形如鬼清臞骨不仙死生俱一夢吾自樂吾天送吳言可之鄞四明多勝迹不憚此行難客棹霜天晚征衫道路寒湖靈通夕見海日帶潮看莫逺乘槎去風濤卒未安冬日晨興開樓看雪坐半榻著吟僧頑甚不知冷唾來還欲氷空庭眠病鶴凍壁立僵蠅鄰巷有貧者曉炊猶未能題陸介夫隱居圗竹籬茅舍處此是陸家村惟有鶴看屋更無人到門古琴長挂壁春酒自盈樽似隱還非隱幽居亦寓言送杜子問歸明州未酬行道志抱道復東歸老入江湖鬢寒深雨雪衣客程煙樹晚鄉夢海魚肥所恨交情淺臨岐别語稀對月懷故人相思不成寐風露夜漫漫明月此時好故人何處看客愁杯酒盡秋影一燈殘空羡樓前鴈欲飛無羽翰默默詩默默守吾玄此心誰共言青天開有眼白日走無根嵗月貂裘敝生涯鐡硯存古人如可作買酒為招魂山居無名亦無利非隱又非仙逐獸機心息聞禽野性便俗淳猶近古人老不知年此是山居樂山中别一天三省齋為洪中行賦機巧日相尋誰能自警深惟君學夫子此意即曽參鐘破平生夢燈明半夜心遙知讀書處松桂巳成林自在廬為倪遜翁賦翁也家何在悠然天地間往來明月牖坐卧白雲關晚嵗有餘樂誰人似此間只為清景惱吟得鬢毛斑送周伯賜之餘姚佳友難為别何時重盍簪客衣黃葉滿書屋白雲深落月生離夢寒蛩助越吟抱琴從此去虞氏有遺音破衣和尚平生只布衲渾似晚秋蓮當日住何寺隨身著幾年懶將黃葉補間共白雲眠結屋吳山下修行了宿緣聞復先上人下世滿腹貯韓文僧中少似君行髙臨死見名重在生聞霜變北峰樹猿啼下竺雲未知埋骨處消得片香焚五言排律題林進士玉芝西澗小隱小山尋杖屨璧水歎荆榛結屋依泉石彈冠謝俗塵傷心天寶事散髮義熙民芝嶺甘幽曠桃源慕隱淪田園謀老計花竹結芳鄰孔孟惟憂道夷齊不患貧無官勞逺夢有地著間身來往唐冠帶留題漢縉紳知君易尚在吾亦守吾真
