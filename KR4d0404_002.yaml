body:
  text: 百正集卷中宋連文鳳撰七言律湖上行春踏破六橋楊栁煙鄉心迢遞怯啼鵑好花嵗嵗仍相似白髮星星不再玄囊裏有金堪一醉瓢中無藥可千年遊人不管興亡事但把笙歌閙彩船送沈伯俊回霅江空嵗晚朔風寒詩卷相隨曉出關不為尋梅勞杖履偶因問菊到家山溪橋買酒經過熟鄰舍分茶笑語間若見碧瀾趙公子為言衰鬢與愁顔已卯中秋雨南樓一夢已淒涼好景難逢重感傷天上此時如白晝人間何處有清光山河舊影雲俱黑燈火新愁夜正長畢竟老蟾終古在西風客鬢易蒼蒼寄常州簿鄭宗仁稽山禹穴莽為狐兔神龍遺蛻散亂榛蕪孝子仁人一夕悉取而歸之有人心者能無愧乎聞此悲泣寄以詩玉立蓬萊問淺深仙裾不受海塵侵千年愛護神龍骨萬里淒涼老鶴心夜月照愁低草色秋風吹淚哭松隂錢塘流水情何限誰采蘋花學越吟寄仲寶上人一笑簫韶曲未終清風杖錫欲何從不隨輕絮飄流水且作間雲過别峯昭慶寺前鴉繞樹餘杭山下鶴歸松人來今雨聞消息見説維摩帶病容送劉恱心教授任瀏陽一穗藜煙待校書擕書且此作師儒扶持學法防時弊教養人材應世需蘭芷汀洲身外楚菰蓴鄉國夢中吳片帆好趂秋風便吟過洞庭青草湖夀陳右司白髮蒼顔半醉醒衣冠洛社舊耆英誰能似此存髙節天欲留公相太平間裏看山心共逺老來讀易眼增明年年四月初三夜簾外一痕新月生冬日早行客裏間關去路賒輕衫短帽朔風斜青霜委地疑行雪紅葉成林當落花渡口馬嘶驚睡犬田頭鹿過散飢鴉閉門無事日髙起誰似山中隱士家感春賞心未足事多違啼鳥聲聲怨夕暉客夢一番芳草歇人生幾度落花飛病難為别鄉情逺老不禁愁酒力微猶記當年歌舞地醉遊秉燭夜深歸六和塔訪陳右司空山木落欲何歸渺渺黃塵汚客衣自嘆馮唐今已老世無劉表孰堪依爐中丹火工夫淺籬下文章氣焰微幸識貞元舊朝士錢塘江上語殘暉有感年來懶作少年狂一枕功名屬夢鄉舉世相誇唐字學幾人曾識漢文章自憐晚嵗桑榆景敢入春風桃李場到此相逢莫相笑誰知臧穀兩亡羊題隱者園三徑歸來但閉門門前車馬自紛紛半生活計尋清事一片間心寄白雲暇日池臺行處樂春風禽鳥靜中聞客樓相對西鄰住好景天教向我分湖飲得天字老來更上百花船賴有湖光慰眼前兵後山川仍戀土壺中日月不行天間身適意隨鷗鷺樂事何心問管弦盡醉無愁歸路晚客樓只在廢城邊試筆誰遣毛州刺史來間忩終日共徘徊龍窺石澗新臨硯鶴舞松煙乍試煤茅舍寒深題未遍玉堂月冷夢空回笑豫得爾渾無用惆悵臨風寫八哀趙司門成之新居何必山巔共水涯間心幽逺此相宜喧無車馬紅塵少樂有琴書白日遲晴檻倚風初栁處夜燈聽雨正蛙時客來試問功名事已付功名與酒巵送友人歸越乙亥避地于越後十載越之故人來杭與之相慰藉者纍日語未溫復别去為之黯然妻子相擕失所居山川迢遞更﨑嶇征鴻去去秋風急驚鵲棲棲夜月孤賴有綈袍憐范叔免教岐路泣楊朱歸來每憶溪船上買得鮮魚酒旋沽秋懷酬仇仁近見寄西風一夕送殘蟬老景情懷更惘然蘆荻病中秋瑟瑟家山夢裏路綿綿空城點滴寒莎雨故國淒迷斷礎煙待得鶴歸華表上可堪人世又千年寄上虞周伯起縣尉憶昔論文向酒邊忽來二十二三年别離老淚深春水今古間愁積暮煙吟作南音懷越土望窮東浦隔秦天夢魂不識曹娥渡一紙相思寄客船頑獨頑獨齋前翠色交翛然一榻掩衡茅禪心久作髙僧悟方術寧從道士教曉日短墻花弄影晚風斜檻鶴歸巢老懷自喜詩尤健幾度窮吟憶孟郊寄桐廬李華甫客裏光隂嘆白駒青山何處故人疏花開花落難逢笑潮去潮來莫寄書北海酒深時自醉西湖水淺晚堪漁新詩忽見因相憶何日擕琴話起居謝人惠梅花惟有梅花不厭貧花前笑語伴間身老枝猶帶深山雪生意能回破屋春影待月來明戶牖香隨風散惱比鄰寄余何限江南意幾度相看憶故人自笑自笑儒冠不稱時幾回堪笑復堪悲間門事少知貧好逆境愁多恨死遲勳閣麒麟無夢想故山猿鶴有心期紛紛塵俗都如許吟得詩成欲寄誰紈扇露冷飄零半幅紈傷心不見女乘鸞歌殘春院桃花暖愁殺秋庭木葉寒滿地飛塵何處避舊時明月向誰看應思曾在君懷裏一點恩情欲忘難呈趙侍郎飄眇蓬壺隔俗塵塵中日月易因循白駒皎皎猶空谷秋水娟娟自美人何限溪山分曉夢無情天地著間身抱琴來問吟邊信見説池塘草正春籠中鳥未是扶搖得意時籠中日月且相依一身天地宜間過四面風塵莫逺飛老樹無枝空悵望春山何處不知歸馮君愛取新毛羽休向花前怨落暉送張集父分教越之上虞此去橫經涉逺途三江煙雨晚潮初顓孫豈是貪求祿鄭老從來愛讀書駐馬曉吟曹廟檜倚船時看舜鄉魚顧豫挾册曾遊此故舊相逢為起居挽周明府公謹彭澤歸來厭宦情辨陽山下買山耕春風秋月供吟嘯月夕風朝寄死生銘墓古人堪髣佛著書心事更分明但能似此存清節野史須還記姓名丙戌送李元暉歸劔影悠悠出故都酒邊臨别重躊躇吳江霜早愁聞鴈楚澤天寬老釣魚瑶草春風香未歇美人秋水意何如西湖莫忘間鷗鷺強健不妨頻寄書送陳仲甫挾書遊甫里西風客影鬢毛蒼此去擕琴又一方欲向書中消日月何妨籬下寄文章于今蜀道無平地到處并州即故鄉茶竈筆牀猶在否煩君移棹問滄浪黃資深入道霞衣飛舞越山青回笑時人醉未醒春枕卧看琪樹月夜香學拜石壇星泥成丹竈燒仙藥移近明忩讀道經可惜蓬萊歸不早海風正急海波腥送王道士入燕何處春山采藥還此行萬里道途難西風塵起衣裝重北斗星低劔氣寒學跨青牛朝玉闕語留白鶴守金丹洞門無鑰須歸早莫待桃花落石壇送友人建康入道郁郁文章不稱時豈堪寂寞寄人籬早知亂後為儒誤始恨年來入道遲春晚茅山猶有术秋深商嶺已無芝何當乘此清風去共看山家未了棋釣臺諸將驅馳尺寸功先生來此坐清風漢家天地間身外嚴瀨煙波落照中片石粼粼年嵗晚一絲裊裊利名空笑余亦是垂綸客欲借臺前繫短篷雪幾片飄從客鬢來光搖老眼白皚皚不因枯樹今朝見只道寒梅昨夜開是處園林迎臘到一時天地唤春回慿誰寄語問滕六乞與人間此種栽春日田園雜興案此詩永樂大典闕載今從月泉吟社詩補入老我無心出市朝東風林壑自逍遙一犁好雨秧初種幾道寒泉藥旋澆放犢曉登雲外壟聽鶯時立栁邊橋池塘見説生新草已許吟魂入夢招案月泉吟社原評云衆傑作中求其粹然無疵極整齊而不窘邊幅者此為冠七言絶已丑元宵不因燈火有元宵強把時光慰寂寥十四年來無此興三更踏月過河橋王昭君使者相隨出漢宫辭君上馬去匆匆只因自恃好顔色不把金錢買畫工書齋夜坐讀罷殘書聽雁聲西風一榻一青燈老來清思渾如許自笑前生莫是僧中秋夜坐寂寞無如此夜坐西忩剪燭讀離騷可憐塵世多風雨天柱峯頭月正髙贈賣花湖妓客來不惜買花錢客醉青樓月在天欲盡樽前歌舞意湖頭已有早開船虞美人帳中對飲復髙歌飲罷歌殘淚雨多自是天將亡楚國不因紅粉失山河月夜獨坐坐久不聞人語喧風枝吹動宿禽翻幾家負却三更月未到鐘聲已閉門送韓仲文歸京口二首有客京口號竹坡蒼然碧玉橫清波淒涼駝陌走風雨遊塵飛撲征衫多一點吳山看未了鄉夢悠悠大江表夕陽何處認歸帆野樹蒼煙隔飛鳥送髙繼伯分教湖之德清此時不忍抱遺材欲把文章扇冷灰見説讀書堂尚在瓣香寄與謁東萊小雪次北客韻豐年佳瑞此先知莫恨無多莫恨遲若使紛紛猶未已梅花凍殺又多時賦椰子吸月杯殼似懸匏護玉房誰人剖玉注天漿有時吞却杯中兔帶得長生藥氣香費壺天人一理堂髙髙下下兩無窮盡在壺天一色中俯仰不堪供一笑何當相與問洪濛賦黑兔昔日蟾宫搗藥時桂花樹下影依依一朝誤落人間世却被緇塵染素衣送友人歸越把手西風晚菊天夢魂喚醒十年前未能捫蝨談時事且與持螯上酒船吳越青山猶好在古今明月不長圓可堪老大重離别一片愁心落照邊端午相傳楚俗試蘭湯一枕南薰日正長門掩緑隂無箇事起來燒過午時香壬午觀火地燒盡長安市上花何時重見此繁華獨憐幾處堂前燕失却新巢過别家題乾洞何人鑿破雲煙壑百丈雲煙生節角解衣盤礴坐山風一片松花半空落紀夢薰風一榻卧南忩無事縈心暑亦涼半夜忽生鄉土夢屋前屋後荔枝香讀史滿道纍纍盡赭衣含寃相語泣相隨不因今日身親見只説先秦事可疑題胭脂驄圖世上紛紛駑與駘分明此種是龍媒雪毛尚帶胭脂濕想是扶桑作浴回參寥泉習習竹風吹古井點點苔花生斷綆寒泉不浸詩人脾謾乞山僧潑春茗枕易身世相忘象外天清風一枕幾千年有時默默焚香坐間看白雲心自玄憶趙右之羞見梅花照客身梅花長好客長貧江天搖落年華晚何處青山有故人流杯亭流杯亭下水無聲滿地牛羊野草腥何事當時貪宴會至今帝醉未能醒餘杭道中曉行曉霧溟濛未見天山光水影白相連餘杭不似西川路六月中旬呌杜鵑項籍蓋世英雄冠古今干戈未定日相尋帳中一夕悲歌處霸氣難降兒女心緑珠忍將死别季倫家百丈樓前日色斜一片香魂隨笛散却疑吹落玊梅花銅雀臺月正明時星正稀鄴城風雨忽淒淒荒臺深鎖殘春色半夜寒鴉繞樹啼山雲去如斷雁失羣飛來是髙僧出定歸無去無來林下客吟魂一片共依依題畫嬌紅淡粉逞春姿好手移來一兩枝見説此花三十種只消莫畫醉西施
