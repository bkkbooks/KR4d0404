body:
  text: 提要百正集三巻别集類三宋臣等謹案百正集三巻宋連文鳳撰文鳳字百正號應山三山人仕履未詳集中暮秋雜興詩有仕籍姓名除句則宋徳祐以前亦嘗從宦又庚子立春詩有又逢庚子嵗老景對韶華句庚子為大徳四年則成宗之時猶在入元巳二十四年矣至元丙戌浦江吳渭邀謝翺方鳳等舉月泉吟社以春日田園雜興為題徴詩四方得二千七百三十五巻入選者二百八十巻刋板者六十巻以羅公福為第一名據題下所註公福即文鳳之寓名也王士正池北偶談則謂月泉吟社詩清新尖刻别自一家而謝翺等品題未允因重為移置改文鳳為第二十一名然元初東南詩社作者如林推文鳳為第一物無異詞當必有説似未可以一字一句遽易前人之甲乙今觀所作大抵清切流麗自抒性靈無宋末江湖諸人纎瑣麤獷之習雖上不及尤楊范陸下不及范揭虞揚而位置于諸人之間亦未遽為白茅之藉則當時首屈一指亦有由矣文淵閣書目載連百正丙子稿一部一冊久無傳本永樂大典所載但題曰連百正集當即其本今裒輯排比編為三巻又賦三首序二首記二首説一首傳一首亦散見永樂大典中文格雅潔亦不失前民矩矱其冰壺先生傳一首雖以文為戯然毛穎羅文諸傳載之韓蘇集中古有是例今併附綴巻末以存其梗槩焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4ff61a579e12dcd2e2d26cf7927caf8269547b64cb8abfd7dacde422c126ffd3
