body:
  text: 百正集巻下宋連文鳳撰賦登髙賦天氣清兮髙哉雲溶溶兮四開泫玊露兮既降金颷翔兮埏垓維兹時兮辰良陟彼岡兮崔嵬尋幽壑兮䆳谷坐白石兮蒼苔攀龍山兮逸駕樹㝠㝠兮翳霾矧伊人兮髙風俯同寮兮嬰孩曠千載兮寥寥羗渺渺兮余懐桂芬芬兮椒馨魂欲招兮不來邈今古兮宇宙紛流俗兮喧豗漂翻翻兮上下溷汨汨兮氛埃念浮生兮須臾復何樂兮何哀采落英兮盈掬挹天漿兮如淮聊自適兮容與左持螯兮右杯歘暮景兮短促將駕言兮遄歸舞醉影兮婆娑歌明月兮徘徊獨居賦藐吾生之若浮寄流光之過隙撫景忽以西邁倚長風而抱膝時㑹運之相禪窅洪濛而莫測揆余初兮無為奚終罹以憂戚謇晝短而夜長𦍑天寛而地窄能虚已以游世非達觀其疇識此長慶翁所以叩至順於香山柴桑子所以賦歸休於彭澤也嗟夫蟻戰蝸爭紛紛詐力魚追獸奔汨汨形役以靜觀動由今視昔流芳胡馡馡乎尼父遺臭胡昧昧乎盗跖奚是奚非害䘮害得孰若委道化以樂天泯識知而順則託信宿於蘧廬假夢寢於槐國如斯可以為無懐之民游葛天之域也因論夫俛仰之間貿貿陳迹自其以人勝天者觀之則彊弱小大或得以紊其常自其以天勝人者觀之則富貴貧賤亦各順其所適非天之不可必乎光風韶春好天良夕持白雲以怡恱酌明月而幕席隨坎止而流行付盈虚與消息善葆練以餐和對爐熏而讀易虚舟賦汎彼中流其名曰舟逺可以涉深可以遊伊誰為之有熊氏作如鳥斯飛如馬斯躍彼誕而迂其名曰虚若盈而竭若有而無伊誰為之太空是侣奚放奚歸奚涯奚涘我有虚舟不纜不維篙不可設柂不可施其材孔良其質孔厚般輸顧之吐舌縮首匪樓而髙匪鐵而堅李郭升之儼若登仙放乎巨浸泛無所著係之頺岸淡無所泊萬斛匪重一葉匪輕東西上下不奡而行􅄓風橫江弗震弗擊惡浪排空弗覆弗溺昔有孟明濟河自焚賈勇作氣敗北晉軍繼有公瑾䝉衝鬬艦天與一炬曹師破膽勝則櫂歌負則楫摧一喜一戚往來於懐喜者患得戚者患䘮孰若吾舟從吾放浪利汚吾網名玷吾罾有鼈可庖有魚可羮暮雨朝烟草衣蒻笠日出而出日入而入萬山夜行一笑當空山河大地在吾舟中此時觀之非舟非我心焉如灰形焉如槁適有漁父鼓枻而歌曰月白兮風清雲淡淡兮水泠泠子亦知夫月之所以明風之所以生雲之所以作水之所以行乎吾將與子汎濫乎寛閒之野廣莫之濱余歌而答之曰寛兮閒兮天地之閒兮廣兮莫兮天地之廓兮嗚呼天地亦不過其如是序送苟厚夫學正之昌國序三代鄉舉里選之法久不行於天下吾道一脈綿綿延延至於今不廢幸三代之學法存焉耳不幸而不得其人雖存猶不存也嗟夫學校之設其來非一日漢晉魏隋之間始有學校官有州博士有經學士掌以五經教授繇是教授之名始立名正録者其又何始乎安定胡先生掌太學其正録第補諸生後以上舎内舎充及三舎興始置官如學官之例然則凡學之正録殆昉是而設也雖然是可以倖得哉始也羣試於學月書而季攷釐積而分累校數嵗之中第其最優者升之州若府州若府然後出是命焉然則得一職也亦勞矣向也謂之職今以官名之向也得之州若府今以省命之是選不為不重矣然而不以道藝不以徳行不由科目而來往往技術之流與夫彊有力者得以居是官可歎也已成都苟厚夫無技術之可挾無彊有力之可恃然觀於今世之材之能如吾厚夫者亦不多其人曩任松江學録以恭敬事上官其於朋友則謙以和其於講課也切切偲偲三載攷績官箴無曠今也授以昌國學正葢不過循級而進俾竊升斗之禄得以便朝夕菽水之奉厚夫之本志也奈何力有所不逮技術有所不及故不暇擇地之美惡近逺焉吁亦可歸之命也矣然吾聞之昌國多有材士風俗亦不惡廪稍不敵他學之萬一幸而不至乏絶太凡士君子以道自任無一毫妄求苟欲之心何往而不可焉昔范文正公掌睢陽學時有孫秀才者來謁公贈以錢則以母老無以養為辭公曰吾今補子以學職月得三千以供養子安於學乎孫於是大喜今君誠能委於命安於學月取三千以歸養其親安知他日不為孫泰山也厚夫勉乎哉是行也厚夫固不以地之逺且險為難而惟母老是懼余姑借是說以寛之送吳子敬序釣臺嚴之佳山水也子陵先生畊於是後之人堂而祠焉祠之者敬之也今名其所曰書院以山長名官固將以此處當今之士亦所以重祠事也吁先生隠者也而使仕者居之恐非先生意也然而先生有言曰懐仁輔義天下恱阿諛順㫖要領絶政欲使天下仕者行其義也行其道也不失其要領者也松江吳子敬端友也不汲汲於仕從吾學聲律二年以文字徃來其間者又四三年由是學益進文日益工而畧無一毫侈然自足之態毎告余而言曰仰事俯畜非某所憂也倘能屏去俗慮無所介介乎其中則杜門讀書足爾今子來長是山雙臺相嶔羣樹茂植錦峯繡嶺清麗竒絶是造物者以讀書之地假之也若夫廪稍之虚實生徒之衆寡固皆無頼乎此然以有所挾之才而置之寛閑之野廣莫之濱惜夫雖然學而優則仕仕而優則學今日之仕今日之學其於逺且大者若稼而穀圃而蔬其方來未艾也吾故以要領之言贈吾子子敬其勉諸記學魯齋記錢塘丁君强父文章士也鄉之人咸譽之初余游杭頖君居前廡與之識且嘗與之爭功名於塲屋問後十載奎文歛耀芹藻無香君於是閉門讀書不復以榮進亂心名讀書之齋曰學魯課其子命之朝夕學焉一日造其齋見之且大笑曰異哉奚而名也父字以强子教之魯何勇於己而示子以怯與是必有故也且魯有等級有真有似曾參之魯魯之似者也周勃之魯魯之真者也夫以椎魯少文之夫一旦處大變故不動聲色而能安傾危之社稷若曾子者又非絳侯比也聖門髙弟顔曾為首稱顔有得乎愚之如安知曾不得魯之似然則真可也似亦可也今將教之學真乎學似乎强父曰知愚一武子也吾夫子獨以其愚不可及以善於處愚之時者爾某之子稍聰悟易通於學方今薄習靡靡易以移人可不慮哉詩云他人有心予忖度之予之心子其得之矣烏乎强父往矣有子曰君瑞讀父書世其業心術氣質不為習尚所變化謙於己恭以待人言語動作容止進退無一不於魯之學得之君瑞年方壯籍籍有詩名夫詩亦道也由是懋於詩篤於學庶幾可以進於道進於道是亦曾子已矣是亦曾子已矣四望亭記詩不云乎駕彼四牡四牡項領我瞻四方蹙蹙靡所騁釋者曰人君所乘之馬但養大其領不肯為用喻大臣自恣不能使也瞻望四方蹙蹙然無所馳騁烏乎此刺詩也方今乾坤清夷風雲際㑹氣類感召人材翕合殆非詩之所謂云爾真定髙君章業儒吏由吏而仕官水監急流勇退休於家家之側買地數十弓更剏一亭為棲息之所左右引水翼以池沼疊石前後樹以花木琴棋圖籍筆床茶竈次第於其間落成之後觴客賦詩相與慶斯亭客曰快哉曠瞻遐眺上下四方之宇盡在是矣名不虚得也主人哆然大笑曰噫是不然東望太山虎豹居之南望黃河黿鼍魚鼈生焉函闗據其西大海坐其北江濤如許人物眇然吾之所望者在此不在彼也客悟曰向也子由之謁魏公也亦曰於山則見終南於水則見黃河於人則未見韓太尉然則亭之名詩之意也烏乎子老而致仕猶將以此望天下四方之人材可謂明也已矣可謂逺也已矣於是主人與客盡醉而别真定距杭不下四千里逺以書來述乃事與客之言乞余文於是而為之記說潛谷說余生平讀孔氏書晩年逺公軰招入白蓮社社有孫一之者與焉一日孫子出手巻名曰潛谷求予詩予觀其自叙所以名之之義因語之曰山谷也水亦谷也子獨不觀老氏之說乎谷神不死是謂𤣥牝是谷也乃人身中一虚空處與儒家所謂腔子相似朱文公曰谷之虚也聲達響應焉子惡知乎谷之為彼耶又惡知乎谷之非此耶子學儒者曩也舎儒而學吏今也舎吏而學佛文公早年洞究釋氏之㫖故其言曰佛說皆出老莊今子讀佛氏書誠能參以老氏之學而有得乎潛虚之道將見子之心潛天而天潛地而地谷之義大矣哉諸君長篇短什賦咏盡之矣余不能詩敢借老氏言以為之說傳氷壺先生傳先生蔡州人也姓蔡氏不以名字語人故人皆以氏稱之其先為周諸侯子孫因以國為氏後之種類蕃滋姓氏不一著先生性樸素淡然無欲且善與人交自王公至於庶人莫不親愛之也先生亦不以貧富貴賤厚薄之昔孔子往見之必齋如也顔子與之處不茹葷者三月嘗過秦秦大夫逢氏子患迷罔之疾視白以為黑享香以為臭嘗甜以為苦留先生於門三日不得見及與之語卒不入終其身而不相遭者惟逢氏一人而已及遭蘇峻之亂干戈蹂躪辟地江南舎于陶公之圃㑹太尉庾公來奔陶公素雅敬之為設供饌太尉入見矍然而驚恍然而失良久曰百姓流離嵗且大饉卿獨無恙乎吾不患其無遺種矣相與於邑而别自是先生退居田園無出仕志日與陸葵黃菁之徒往來山谷間天子聞其才欲屈不能致乃遣小黃門賜以八珍之食復命宗室貴戚出五侯鯖餽餉之先生毅然作色曰非其義也非其道也一介不以與人一介不以取諸人遂辭讓不受晚年尤喜浮屠信道術一日往適市市有老翁賣藥挂一壺於肆市罷輙入壺人莫之見先生於樓上覩而異之因奉酒果以往請學其術翁與之坐壺中盡飲而出先生由是頓悟息心屏慮歛迹匿形深扄固閉出入食息必以時盎無升斗之儲惟虀鹽是奉故以氷壺之名自號同郡有劉伯倫者性嗜酒無以檢束一夕痛飲夜半吻燥中庭月朗殘雪未消不逺秦楚之路而踵先生之門先生愛其知已也倒屣出迎延之上坐開樽而飲擊缶而歌乃出石崇所作韭萍虀一品與之咀嚼而去當時王愷富傾天下驕淫侈靡方且歆慕健羡想望其風味而不可得也宋太宗皇帝嘗於經筵中命蘇易簡講文中子至有楊素遺子食經羮藜舎糗之說因問食品何物最珍蘇公侈談先生韭萍虀之美不絶口且謂上界仙厨鸞胎鳳脯殆不及此屢欲作氷壺先生傳而竟不果太宗笑而然之余嘗經游蔡地過其廬見其二子焉長曰蔬幼曰蔌丰姿秀美卓然有祖風不知其為幾十代孫也二子相與言曰吾先公利足以濟人誠足以通神明家世寒㣲史失其傳不獲遇於蘇公命也後之世將無傳焉余感其言而語之曰經不云乎中庸其至矣乎民鮮能久矣人莫不飲食也鮮能知味也今子誠能守先公之道勿替其家聲子不求知於人人自求子矣何患乎無所傳二子聞言喜而退余故為之補傳以成蘇公之志云贊曰先生之美溢人脣齒先生之徳漬人胷臆非玊而珍非氷而清宗廟享之敦素而行子孫保之甘㫖是承肉食者鄙爾羶爾腥又安得與之而爭名嗚呼富者不可保貴者不足恃惟澹泊之士無窮信哉
